<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegas v2.0.4 - Excel Style</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/732/732220.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e2e8f0; color: #333; }
        .excel-table { border-collapse: collapse; width: 100%; background: white; border: 2px solid #217346; }
        .excel-table th { background-color: #217346; color: white; font-weight: 600; text-align: left; padding: 8px 12px; border: 1px solid #1a5a37; font-size: 13px; }
        .excel-table td { border: 1px solid #d1d5db; padding: 6px 12px; font-size: 13px; transition: all 0.2s; }
        .excel-table tr:nth-child(even) { background-color: #f3f4f6; }
        .excel-table tr:hover { background-color: #dcfce7; }
        
        /* Estilo para Linha Liquidada (Riscada) */
        .liquidado { background-color: #f1f5f9 !important; color: #94a3b8 !important; text-decoration: line-through; opacity: 0.7; }
        .liquidado .money { text-decoration: line-through; color: #94a3b8 !important; }

        .excel-input { border: 1px solid #abb1ba; padding: 4px 8px; outline: none; font-size: 13px; }
        .excel-input:focus { border: 1px solid #217346; box-shadow: inset 0 0 2px #217346; }

        .sheet-tab { padding: 8px 20px; background: #fff; border: 1px solid #ccc; border-bottom: none; cursor: pointer; font-size: 13px; font-weight: 500; color: #444; margin-right: 2px; position: relative; top: 1px; }
        .sheet-tab.active { background: #217346; color: white; border-color: #217346; font-weight: bold; }
        .money { font-family: 'Roboto Mono', monospace; }
        @media print { .print-hidden { display: none !important; } }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl border border-gray-400 overflow-hidden">
        
        <div class="bg-[#217346] text-white p-2 flex justify-between items-center print-hidden">
            <div class="flex items-center gap-4">
                <span class="font-bold text-sm ml-2 uppercase">Pegas Financeiro - Excel View</span>
                <select id="select-ano" class="bg-green-700 text-white text-xs border-none outline-none rounded px-2 py-1 cursor-pointer">
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>
                    <option value="2030">2030</option>
                </select>
            </div>
            <button onclick="window.print()" class="hover:bg-green-600 px-3 py-1 rounded text-xs flex items-center gap-2">⎙ IMPRIMIR</button>
        </div>

        <div class="p-6 min-h-[600px]">
            <div id="aba-resumo" class="content-tab">
                <h2 class="text-lg font-bold mb-4 text-green-900 border-b-2 border-green-700">RESUMO DE FLUXO DE CAIXA - <span id="label-ano-resumo">2026</span></h2>
                <table class="excel-table">
                    <thead>
                        <tr><th class="w-1/4">MÊS DE REFERÊNCIA</th><th class="text-right">RECEITAS EM ABERTO</th><th class="text-right">DESPESAS EM ABERTO</th><th class="text-right">SALDO PREVISTO</th></tr>
                    </thead>
                    <tbody id="corpo-resumo"></tbody>
                </table>
                <p class="text-[10px] mt-4 text-gray-500">* Itens riscados (liquidados) não são contabilizados nos totais acima.</p>
            </div>

            <div id="aba-salario" class="content-tab hidden">
                <div class="flex gap-1 mb-4" id="sub-nav-salario"></div>
                <div id="container-salario-meses"></div>
            </div>

            <div id="aba-devedores" class="content-tab hidden">
                <div class="flex gap-1 mb-4" id="sub-nav-devedores"></div>
                <div id="container-devedores-meses"></div>
            </div>

            <div id="container-gastos-meses"></div>
        </div>

        <div class="bg-gray-100 border-t border-gray-300 flex px-4 pt-2 print-hidden overflow-x-auto">
            <button onclick="mudarAba('resumo')" id="btn-resumo" class="sheet-tab active">Resumo_Anual</button>
            <button onclick="mudarAba('salario')" id="btn-salario" class="sheet-tab">Receitas</button>
            <button onclick="mudarAba('devedores')" id="btn-devedores" class="sheet-tab">Devedores</button>
            <div id="meses-nav-lista" class="flex"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, off, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_nKoE9Y_5KZiWVteb7bTsOPTYXc5g9kY",
            authDomain: "pegas-controle-de-fluxo.firebaseapp.com",
            databaseURL: "https://pegas-controle-de-fluxo-default-rtdb.firebaseio.com",
            projectId: "pegas-controle-de-fluxo",
        };

        const app = initializeApp(firebaseConfig);
        const dbFirebase = getDatabase(app);
        
        const mesesNomes = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const mesesIds = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];

        let localDB = {};
        let anoAtual = "2026";

        const montarEstrutura = () => {
            const mesesNav = document.getElementById('meses-nav-lista');
            const corpoRes = document.getElementById('corpo-resumo');
            const subSal = document.getElementById('sub-nav-salario');
            const subDev = document.getElementById('sub-nav-devedores');
            const contSal = document.getElementById('container-salario-meses');
            const contDev = document.getElementById('container-devedores-meses');
            const contGas = document.getElementById('container-gastos-meses');

            mesesIds.forEach((id, i) => {
                mesesNav.innerHTML += `<button onclick="mudarAba('${id}')" id="btn-${id}" class="sheet-tab">${mesesNomes[i].substring(0,3)}</button>`;
                corpoRes.innerHTML += `<tr class="cursor-pointer" onclick="mudarAba('${id}')"><td class="font-bold text-gray-700">${mesesNomes[i]}</td><td id="res-sal-${id}" class="text-right money text-green-700">R$ 0,00</td><td id="res-gas-${id}" class="text-right money text-red-700">R$ 0,00</td><td id="res-tot-${id}" class="text-right money font-bold">R$ 0,00</td></tr>`;
                
                subSal.innerHTML += `<button onclick="mudarMesSubAba('${id}', 'sal')" id="btn-sal-${id}" class="border px-3 py-1 bg-white text-xs hover:bg-gray-100">${mesesNomes[i]}</button>`;
                subDev.innerHTML += `<button onclick="mudarMesSubAba('${id}', 'dev')" id="btn-dev-${id}" class="border px-3 py-1 bg-white text-xs hover:bg-gray-100">${mesesNomes[i]}</button>`;

                contSal.innerHTML += `<div id="sal-mes-${id}" class="sal-content hidden"><div class="flex gap-2 mb-4 bg-gray-100 p-2 border border-gray-300"><input type="text" id="desc-sal-${id}" placeholder="Fonte" class="excel-input flex-1"><input type="number" id="valor-sal-${id}" placeholder="R$" class="excel-input w-28"><button onclick="addItem('${id}', 'sal')" class="bg-[#217346] text-white px-4 py-1 text-sm font-bold">INSERIR</button></div><table class="excel-table"><tbody id="tabela-sal-${id}"></tbody></table></div>`;
                contDev.innerHTML += `<div id="dev-mes-${id}" class="dev-content hidden"><div class="flex gap-2 mb-4 bg-gray-100 p-2 border border-gray-300"><input type="text" id="desc-dev-${id}" placeholder="Devedor" class="excel-input flex-1"><input type="number" id="valor-dev-${id}" placeholder="R$" class="excel-input w-28"><button onclick="addItem('${id}', 'dev')" class="bg-gray-700 text-white px-4 py-1 text-sm font-bold">INSERIR</button></div><table class="excel-table"><tbody id="tabela-dev-${id}"></tbody></table></div>`;

                contGas.innerHTML += `
                    <div id="aba-${id}" class="content-tab hidden">
                        <h3 class="font-bold text-green-900 uppercase mb-2">CONTROLE DE DESPESAS: ${mesesNomes[i]}</h3>
                        <div class="flex gap-2 mb-4 bg-gray-100 p-2 border border-gray-300">
                            <input type="text" id="desc-${id}" placeholder="Descrição" class="excel-input flex-1">
                            <input type="number" id="dia-${id}" placeholder="Dia" class="excel-input w-16">
                            <input type="number" id="valor-${id}" placeholder="Valor R$" class="excel-input w-32">
                            <button onclick="addItem('${id}', 'gas')" class="bg-[#217346] text-white px-6 py-1 font-bold">LANÇAR</button>
                        </div>
                        <table class="excel-table">
                            <thead><tr><th class="w-16 text-center">DIA</th><th>DESCRIÇÃO</th><th class="text-right">VALOR</th><th class="w-40 text-center">AÇÕES</th></tr></thead>
                            <tbody id="tabela-gas-${id}"></tbody>
                        </table>
                    </div>`;
            });
        };

        montarEstrutura();

        const carregarDadosDoAno = (ano) => {
            document.getElementById('label-ano-resumo').innerText = ano;
            const dbPath = ref(dbFirebase, `pegas_v1/transacoes/${ano}`);
            off(dbPath);
            onValue(dbPath, (snap) => {
                localDB = snap.val() || {};
                renderTudo();
            });
        };

        window.addItem = (mes, tipo) => {
            const p = tipo === 'sal' ? '-sal-' : (tipo === 'dev' ? '-dev-' : '-');
            const d = document.getElementById(`desc${p}${mes}`);
            const v = document.getElementById(`valor${p}${mes}`);
            const diaSel = document.getElementById(`dia-${mes}`);
            if(!d.value || !v.value) return;
            const refItem = push(ref(dbFirebase, `pegas_v1/transacoes/${anoAtual}/${mes}/${tipo}`));
            set(refItem, { id: refItem.key, desc: d.value, valor: parseFloat(v.value), dia: diaSel ? diaSel.value : "", liquidado: false, ts: Date.now() });
            d.value = ""; v.value = ""; if(diaSel) diaSel.value = "";
        };

        window.alternarLiquidado = (mes, tipo, id, statusAtual) => {
            const itemRef = ref(dbFirebase, `pegas_v1/transacoes/${anoAtual}/${mes}/${tipo}/${id}`);
            update(itemRef, { liquidado: !statusAtual });
        };

        window.excluirItem = (mes, tipo, id) => {
            if(confirm("Deseja apagar este registro permanentemente?")) remove(ref(dbFirebase, `pegas_v1/transacoes/${anoAtual}/${mes}/${tipo}/${id}`));
        };

        window.editarItem = (mes, tipo, id, campoParaEditar, valorAtual) => {
            let novoValor = prompt(`Editar ${campoParaEditar === 'desc' ? 'Descrição' : 'Valor'}:`, valorAtual);
            if (novoValor !== null && novoValor !== "") {
                const itemRef = ref(dbFirebase, `pegas_v1/transacoes/${anoAtual}/${mes}/${tipo}/${id}`);
                let updateDados = {};
                updateDados[campoParaEditar] = (campoParaEditar === 'valor') ? parseFloat(novoValor) : novoValor;
                update(itemRef, updateDados);
            }
        };

        const renderTudo = () => {
            mesesIds.forEach(id => {
                ['sal', 'dev', 'gas'].forEach(tipo => {
                    const cont = document.getElementById(`tabela-${tipo === 'gas' ? 'gas' : tipo}-${id}`);
                    if(!cont) return;
                    const lista = Object.values(localDB[id]?.[tipo] || {}).sort((a,b) => (a.dia || 0) - (b.dia || 0));
                    cont.innerHTML = lista.map(i => `
                        <tr class="${i.liquidado ? 'liquidado' : ''}">
                            ${tipo === 'gas' ? `<td class="text-center font-bold text-blue-800">${i.dia || '-'}</td>` : ''}
                            <td class="uppercase font-semibold">${i.desc}</td>
                            <td class="text-right money">${formatar(i.valor)}</td>
                            <td class="text-center">
                                <button onclick="alternarLiquidado('${id}','${tipo}','${i.id}', ${i.liquidado})" class="mr-2 ${i.liquidado ? 'text-gray-400 font-normal' : 'text-green-600 font-bold'}" title="Marcar como Liquidado">✓</button>
                                <button onclick="editarItem('${id}','${tipo}','${i.id}', 'desc', '${i.desc}')" class="text-blue-500 mr-2" title="Editar Nome">✎</button>
                                <button onclick="editarItem('${id}','${tipo}','${i.id}', 'valor', '${i.valor}')" class="text-emerald-600 mr-2" title="Editar Valor">$</button>
                                <button onclick="excluirItem('${id}','${tipo}','${i.id}')" class="text-red-400 hover:text-red-700">✕</button>
                            </td>
                        </tr>`).join('');
                });
                
                // Cálculo do Resumo (apenas itens NÃO liquidados)
                const rSal = Object.values(localDB[id]?.sal || {}).filter(i => !i.liquidado).reduce((s,i) => s+i.valor, 0);
                const rGas = Object.values(localDB[id]?.gas || {}).filter(i => !i.liquidado).reduce((s,i) => s+i.valor, 0);
                
                document.getElementById(`res-sal-${id}`).innerText = formatar(rSal);
                document.getElementById(`res-gas-${id}`).innerText = formatar(rGas);
                const total = rSal - rGas;
                const elTot = document.getElementById(`res-tot-${id}`);
                elTot.innerText = formatar(total);
                elTot.className = `text-right money font-bold ${total >= 0 ? 'text-blue-700' : 'text-red-700'}`;
            });
        };

        function formatar(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        window.mudarAba = (id) => {
            document.querySelectorAll('.content-tab').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('.sheet-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('aba-' + id)?.classList.remove('hidden');
            document.getElementById('btn-' + id)?.classList.add('active');
            if(id === 'salario') mudarMesSubAba('jan', 'sal');
            if(id === 'devedores') mudarMesSubAba('jan', 'dev');
        };

        window.mudarMesSubAba = (id, tipo) => {
            document.querySelectorAll(`.${tipo}-content`).forEach(e => e.classList.add('hidden'));
            document.getElementById(`${tipo}-mes-${id}`)?.classList.remove('hidden');
        };

        document.getElementById('select-ano').addEventListener('change', (e) => {
            anoAtual = e.target.value;
            carregarDadosDoAno(anoAtual);
        });

        carregarDadosDoAno(anoAtual);
    </script>
</body>
</html>
