<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegas v1.1 - Controle de Fluxo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 3px solid #3b82f6 !important; color: #3b82f6 !important; font-weight: 800 !important; background-color: white !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sub-tab-active { background-color: #f0fdf4 !important; color: #16a34a !important; border-color: #86efac !important; }
        .sub-tab-dev-active { background-color: #fff7ed !important; color: #ea580c !important; border-color: #fdba74 !important; }
        .content-tab { display: none; }
        .content-tab.active { display: block !important; }
        
        /* MODO CELULAR FORÇADO */
        .modo-celular .max-w-6xl { max-width: 450px !important; margin: 0 auto; font-size: 14px; }
        .modo-celular .nav-btn { padding: 10px 12px !important; font-size: 8px !important; }
        .modo-celular h1 { font-size: 18px !important; }

        .nav-wrapper { position: relative; display: flex; align-items: center; background: #f8fafc; }
        .nav-scroll { scroll-behavior: smooth; }
        .arrow-btn { background: #f8fafc; z-index: 60; padding: 0 12px; height: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; color: #64748b; font-size: 10px; }
        .fixa-chip { padding: 4px 10px; background: #e2e8f0; border-radius: 12px; font-size: 10px; font-weight: bold; color: #475569; cursor: pointer; white-space: nowrap; margin-bottom: 5px; margin-right: 4px; display: inline-block; }

        @media print {
            .nav-wrapper, .bg-slate-800, .fixa-chip, button, input, .print-hidden { display: none !important; }
            .max-w-6xl { border: none; shadow: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body id="body-app" class="bg-gray-100 p-2 md:p-8 transition-all duration-300">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        
        <div class="bg-slate-800 p-4 md:p-6 text-white flex justify-between items-center print-hidden">
            <div>
                <h1 class="text-xl md:text-2xl font-bold italic uppercase tracking-widest">Pegas <span class="text-xs font-normal opacity-50">v1.1</span></h1>
                <p class="text-slate-400 text-[10px] md:text-sm">Controle de Fluxo</p>
            </div>
            <div class="flex gap-2">
                <button onclick="alternarModo()" id="btn-modo" class="text-[9px] bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded border border-slate-500 font-bold uppercase transition-all">MODO CELULAR</button>
                <button onclick="window.print()" class="text-[9px] bg-red-700 hover:bg-red-600 px-3 py-2 rounded border border-red-500 font-bold uppercase transition-all">PDF</button>
            </div>
        </div>

        <div class="nav-wrapper border-b sticky top-0 z-50 print-hidden">
            <button onclick="scrollNav(-100)" class="arrow-btn">◀</button>
            <nav id="nav-principal" class="nav-scroll flex overflow-x-auto no-scrollbar flex-1 bg-slate-50 font-bold">
                <button onclick="mudarAba('resumo')" id="btn-resumo" class="nav-btn px-5 py-4 text-[10px] uppercase whitespace-nowrap tab-active">Resumo</button>
                <button onclick="mudarAba('salario')" id="btn-salario" class="nav-btn px-5 py-4 text-[10px] uppercase whitespace-nowrap border-l text-green-600">Receitas</button>
                <button onclick="mudarAba('devedores')" id="btn-devedores" class="nav-btn px-5 py-4 text-[10px] uppercase whitespace-nowrap border-l text-orange-600">Devedores</button>
                <div id="meses-nav-lista" class="flex"></div>
            </nav>
            <button onclick="scrollNav(100)" class="arrow-btn">▶</button>
        </div>

        <div id="aba-resumo" class="p-4 md:p-6 content-tab active">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-[10px] md:text-xs">
                    <thead>
                        <tr class="bg-slate-100 uppercase font-bold text-slate-500">
                            <th class="p-3 border-b">Mês</th>
                            <th class="p-3 border-b text-right text-green-700">Receitas (+)</th>
                            <th class="p-3 border-b text-right text-red-700">Gastos (-)</th>
                            <th class="p-3 border-b text-right bg-slate-200 text-slate-800">Saldo</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-resumo"></tbody>
                </table>
            </div>
        </div>

        <div id="aba-salario" class="p-4 md:p-6 content-tab">
            <h3 class="font-bold text-green-700 mb-4 uppercase text-sm">Receitas</h3>
            <div class="flex overflow-x-auto gap-2 mb-6 no-scrollbar print-hidden" id="sub-nav-salario"></div>
            <div id="container-salario-meses"></div>
        </div>

        <div id="aba-devedores" class="p-4 md:p-6 content-tab">
            <h3 class="font-bold text-orange-700 mb-4 uppercase text-sm">Devedores</h3>
            <div class="flex overflow-x-auto gap-2 mb-6 no-scrollbar print-hidden" id="sub-nav-devedores"></div>
            <div id="container-devedores-meses"></div>
        </div>

        <div id="container-gastos-meses"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_nKoE9Y_5KZiWVteb7bTsOPTYXc5g9kY",
            authDomain: "pegas-controle-de-fluxo.firebaseapp.com",
            databaseURL: "https://pegas-controle-de-fluxo-default-rtdb.firebaseio.com",
            projectId: "pegas-controle-de-fluxo",
            storageBucket: "pegas-controle-de-fluxo.firebasestorage.app",
            messagingSenderId: "249630798554",
            appId: "1:249630798554:web:2a9bf03cd8d74dad76be3"
        };

        const app = initializeApp(firebaseConfig);
        const dbFirebase = getDatabase(app);
        const dbRef = ref(dbFirebase, 'pegas_v1');

        const mesesNomes = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const mesesIds = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
        const despesasFixas = ["Cartão Nubank", "Cartão Will", "Cartão Bradesco", "Internet", "Alimentação", "Luz"];

        let localDB = { transacoes: {} };

        window.alternarModo = () => {
            const body = document.getElementById('body-app');
            const btn = document.getElementById('btn-modo');
            if(body.classList.contains('modo-celular')){
                body.classList.remove('modo-celular');
                btn.innerText = "MODO CELULAR";
            } else {
                body.classList.add('modo-celular');
                btn.innerText = "MODO PC";
            }
        };

        const montarEstrutura = () => {
            const mesesNav = document.getElementById('meses-nav-lista');
            const corpoRes = document.getElementById('corpo-resumo');
            const subSal = document.getElementById('sub-nav-salario');
            const subDev = document.getElementById('sub-nav-devedores');
            const contSal = document.getElementById('container-salario-meses');
            const contDev = document.getElementById('container-devedores-meses');
            const contGas = document.getElementById('container-gastos-meses');

            mesesIds.forEach((id, i) => {
                mesesNav.innerHTML += `<button onclick="mudarAba('${id}')" id="btn-${id}" class="nav-btn px-5 py-4 text-[10px] uppercase border-l border-gray-200 whitespace-nowrap">${mesesNomes[i]}</button>`;
                corpoRes.innerHTML += `<tr class="border-b"><td class="p-3 font-bold text-slate-600">${mesesNomes[i]}</td><td id="res-sal-${id}" class="p-3 text-right text-green-600 font-mono font-bold">R$ 0,00</td><td id="res-gas-${id}" class="p-3 text-right text-red-500 font-mono font-bold">R$ 0,00</td><td id="res-tot-${id}" class="p-3 text-right font-mono font-bold bg-slate-50">R$ 0,00</td></tr>`;
                
                subSal.innerHTML += `<button onclick="mudarMesSubAba('${id}', 'sal')" id="btn-sal-${id}" class="px-3 py-1 border rounded-full text-[9px] uppercase font-bold bg-white text-gray-500">${mesesNomes[i].substring(0,3)}</button>`;
                subDev.innerHTML += `<button onclick="mudarMesSubAba('${id}', 'dev')" id="btn-dev-${id}" class="px-3 py-1 border rounded-full text-[9px] uppercase font-bold bg-white text-gray-500">${mesesNomes[i].substring(0,3)}</button>`;

                contSal.innerHTML += `<div id="sal-mes-${id}" class="sal-content hidden"><div class="flex flex-col md:flex-row gap-2 mb-4 p-3 bg-green-50 rounded border"><input type="text" id="desc-sal-${id}" placeholder="Fonte" class="p-2 border rounded text-xs"><input type="number" id="valor-sal-${id}" placeholder="R$" class="p-2 border rounded text-xs"><button onclick="addItem('${id}', 'sal')" class="bg-green-600 text-white p-2 rounded text-xs font-bold">ADICIONAR</button></div><table class="w-full text-xs border"><tbody id="tabela-sal-${id}" class="bg-white"></tbody></table></div>`;
                contDev.innerHTML += `<div id="dev-mes-${id}" class="dev-content hidden"><div class="flex flex-col md:flex-row gap-2 mb-4 p-3 bg-orange-50 rounded border"><input type="text" id="desc-dev-${id}" placeholder="Nome" class="p-2 border rounded text-xs"><input type="number" id="valor-dev-${id}" placeholder="R$" class="p-2 border rounded text-xs"><button onclick="addItem('${id}', 'dev')" class="bg-orange-600 text-white p-2 rounded text-xs font-bold">ADICIONAR</button></div><table class="w-full text-xs border"><tbody id="tabela-dev-${id}" class="bg-white"></tbody></table></div>`;

                let chips = despesasFixas.map(f => `<span class="fixa-chip" onclick="window.preencherFixa('${id}', '${f}')">${f}</span>`).join('');
                contGas.innerHTML += `<div id="aba-${id}" class="p-4 md:p-6 content-tab"><h3 class="text-sm font-bold text-slate-700 mb-2 uppercase">${mesesNomes[i]}</h3><div class="flex flex-wrap mb-4">${chips}</div><div class="flex flex-col md:flex-row gap-2 mb-4 p-3 bg-slate-50 border rounded"><input type="text" id="desc-${id}" placeholder="Gasto" class="p-2 border rounded text-xs flex-1"><input type="number" id="valor-${id}" placeholder="R$" class="p-2 border rounded text-xs md:w-24"><button onclick="addItem('${id}', 'gas')" class="bg-blue-600 text-white p-2 rounded text-xs font-bold uppercase">OK</button></div><table class="w-full text-[11px] md:text-xs border"><tbody id="tabela-gas-${id}" class="bg-white"></tbody></table></div>`;
            });
        };

        montarEstrutura();

        onValue(dbRef, (snap) => {
            localDB = snap.val() || { transacoes: {} };
            renderTudo();
        });

        window.scrollNav = (a) => document.getElementById('nav-principal').scrollLeft += a;
        window.preencherFixa = (mes, nome) => { document.getElementById('desc-'+mes).value = nome; document.getElementById('valor-'+mes).focus(); };

        window.mudarAba = (id) => {
            document.querySelectorAll('.content-tab').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('tab-active'));
            const alvo = document.getElementById('aba-' + id);
            if(alvo) alvo.classList.add('active');
            const btn = document.getElementById('btn-' + id);
            if(btn) {
                btn.classList.add('tab-active');
                btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            }
            if(id === 'salario') mudarMesSubAba('jan', 'sal');
            if(id === 'devedores') mudarMesSubAba('jan', 'dev');
        };

        window.mudarMesSubAba = (id, tipo) => {
            document.querySelectorAll(`.${tipo}-content`).forEach(e => e.classList.add('hidden'));
            document.querySelectorAll(`[id^="btn-${tipo}-"]`).forEach(b => b.classList.remove('sub-tab-active', 'sub-tab-dev-active'));
            document.getElementById(`${tipo}-mes-${id}`).classList.remove('hidden');
            document.getElementById(`btn-${tipo}-${id}`).classList.add(tipo === 'sal' ? 'sub-tab-active' : 'sub-tab-dev-active');
        };

        window.addItem = (mes, tipo) => {
            const p = tipo === 'sal' ? '-sal-' : (tipo === 'dev' ? '-dev-' : '-');
            const d = document.getElementById(`desc${p}${mes}`);
            const v = document.getElementById(`valor${p}${mes}`);
            if(!d.value || !v.value) return;
            const refItem = push(ref(dbFirebase, `pegas_v1/transacoes/${mes}/${tipo}`));
            set(refItem, { id: refItem.key, desc: d.value, valor: parseFloat(v.value) });
            d.value = ""; v.value = "";
        };

        window.excluirItem = (mes, tipo, id) => {
            if(confirm("Excluir?")) remove(ref(dbFirebase, `pegas_v1/transacoes/${mes}/${tipo}/${id}`));
        };

        function formatar(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        const renderTudo = () => {
            mesesIds.forEach(id => {
                ['sal', 'dev', 'gas'].forEach(tipo => {
                    const cont = document.getElementById(`tabela-${tipo === 'gas' ? 'gas' : tipo}-${id}`);
                    const dados = localDB.transacoes?.[id]?.[tipo] || {};
                    cont.innerHTML = Object.values(dados).map(i => `
                        <tr class="border-b"><td class="p-2 text-slate-700">${i.desc}</td><td class="p-2 text-right font-bold">R$ ${i.valor.toFixed(2)}</td>
                        <td class="p-2 text-right"><button onclick="excluirItem('${id}','${tipo}','${i.id}')" class="text-red-500 font-bold px-2">✕</button></td></tr>
                    `).join('');
                });
                
                const rSal = Object.values(localDB.transacoes?.[id]?.sal || {}).reduce((s,i) => s+i.valor, 0);
                const rGas = Object.values(localDB.transacoes?.[id]?.gas || {}).reduce((s,i) => s+i.valor, 0);
                
                document.getElementById(`res-sal-${id}`).innerText = formatar(rSal);
                document.getElementById(`res-gas-${id}`).innerText = formatar(rGas);
                const total = rSal - rGas;
                const elTot = document.getElementById(`res-tot-${id}`);
                elTot.innerText = formatar(total);
                elTot.style.color = total >= 0 ? '#2563eb' : '#dc2626';
            });
        };
    </script>
</body>
</html>
