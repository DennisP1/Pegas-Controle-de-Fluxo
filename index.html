<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="viewport">
    <title>Pegas v2.0.4 - Premium Apex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #e2e8f0; }
        .glass-card { background: #161b26; border: 1px solid #2d3748; border-radius: 16px; }
        .glass-input { background: #1a202c; border: 1px solid #2d3748; color: white; border-radius: 10px; }
        .tab-active { background: #3b82f6 !important; color: white !important; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); border-color: #3b82f6 !important; }
        .nav-btn { transition: all 0.3s ease; border-radius: 10px; margin: 0 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        table { border-spacing: 0 8px; border-collapse: separate; }
        tr.row-bg { background: #1a202c; transition: transform 0.2s; }
        tr.row-bg:hover { transform: scale(1.005); background: #222a38; }
        .chip-dia { background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 10px; min-width: 35px; text-align: center; }
        @media print { .print-hidden { display: none !important; } body { background: white; color: black; } .glass-card { border: none; background: white; } }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-6xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 print-hidden">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-2xl flex items-center justify-center bg-slate-800 shadow-2xl border border-slate-700 overflow-hidden">
                    <img src="URL_DA_SUA_IMAGEM_AQUI" alt="Pegas Logo" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-widest uppercase text-white">Pegas <span class="text-blue-500 font-normal text-xs ml-1">v2.0.4</span></h1>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <select id="select-ano" class="glass-input px-4 py-2 text-sm font-bold outline-none cursor-pointer">
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>
                    <option value="2030">2030</option>
                </select>
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg shadow-blue-900/30">Gerar PDF</button>
            </div>
        </header>

        <div class="nav-wrapper mb-8 flex items-center print-hidden">
            <nav id="nav-principal" class="flex overflow-x-auto no-scrollbar gap-2 py-2">
                <button onclick="mudarAba('resumo')" id="btn-resumo" class="nav-btn px-6 py-3 text-[11px] font-bold uppercase glass-card tab-active">Balanço Anual</button>
                <button onclick="mudarAba('salario')" id="btn-salario" class="nav-btn px-6 py-3 text-[11px] font-bold uppercase glass-card">Receitas</button>
                <button onclick="mudarAba('devedores')" id="btn-devedores" class="nav-btn px-6 py-3 text-[11px] font-bold uppercase glass-card">Devedores</button>
                <div id="meses-nav-lista" class="flex gap-2 ml-4 border-l border-slate-700 pl-4"></div>
            </nav>
        </div>

        <div id="aba-resumo" class="content-tab active">
            <div class="glass-card p-6 overflow-x-auto">
                <h3 class="font-bold mb-6 uppercase text-xs tracking-widest text-slate-400">📊 Balanço de <span id="label-ano-resumo">2026</span></h3>
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="text-slate-500 uppercase font-bold border-b border-slate-700">
                            <th class="p-4">Mês</th>
                            <th class="p-4 text-right text-green-500">Receitas</th>
                            <th class="p-4 text-right text-red-400">Gastos</th>
                            <th class="p-4 text-right">Saldo</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-resumo"></tbody>
                </table>
            </div>
        </div>

        <div id="aba-salario" class="content-tab hidden">
            <div class="flex overflow-x-auto gap-2 mb-6 no-scrollbar" id="sub-nav-salario"></div>
            <div id="container-salario-meses"></div>
        </div>
        <div id="aba-devedores" class="content-tab hidden">
            <div class="flex overflow-x-auto gap-2 mb-6 no-scrollbar" id="sub-nav-devedores"></div>
            <div id="container-devedores-meses"></div>
        </div>
        <div id="container-gastos-meses"></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_nKoE9Y_5KZiWVteb7bTsOPTYXc5g9kY",
            authDomain: "pegas-controle-de-fluxo.firebaseapp.com",
            databaseURL: "https://pegas-controle-de-fluxo-default-rtdb.firebaseio.com",
            projectId: "pegas-controle-de-fluxo",
            storageBucket: "pegas-controle-de-fluxo.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const dbFirebase = getDatabase(app);
        
        const mesesNomes = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        const mesesIds = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
        const despesasFixas = ["Nubank", "Will", "Bradesco", "Net", "Mercado", "Luz"];

        let localDB = {};
        let anoAtual = "2026";

        const montarEstrutura = () => {
            const mesesNav = document.getElementById('meses-nav-lista');
            const corpoRes = document.getElementById('corpo-resumo');
            const subSal = document.getElementById('sub-nav-salario');
            const subDev = document.getElementById('sub-nav-devedores');
            const contSal = document.getElementById('container-salario-meses');
            const contDev = document.getElementById('container-devedores-meses');
            const contGas = document.getElementById('container-gastos-meses');

            mesesIds.forEach((id, i) => {
                mesesNav.innerHTML += `<button onclick="mudarAba('${id}')" id="btn-${id}" class="nav-btn px-4 py-3 text-[11px] font-bold uppercase glass-card">${mesesNomes[i]}</button>`;
                corpoRes.innerHTML += `<tr class="row-bg cursor-pointer" onclick="mudarAba('${id}')"><td class="p-4 font-bold text-slate-300 uppercase">${mesesNomes[i]}</td><td id="res-sal-${id}" class="p-4 text-right text-green-400 font-mono">R$ 0,00</td><td id="res-gas-${id}" class="p-4 text-right text-red-400 font-mono">R$ 0,00</td><td id="res-tot-${id}" class="p-4 text-right font-mono font-bold">R$ 0,00</td></tr>`;
                
                subSal.innerHTML += `<button onclick="mudarMesSubAba('${id}', 'sal')" id="btn-sal-${id}" class="px-4 py-2 glass-card text-[10px] font-bold uppercase nav-btn">${mesesNomes[i]}</button>`;
                subDev.innerHTML += `<button onclick="mudarMesSubAba('${id}', 'dev')" id="btn-dev-${id}" class="px-4 py-2 glass-card text-[10px] font-bold uppercase nav-btn">${mesesNomes[i]}</button>`;

                contSal.innerHTML += `<div id="sal-mes-${id}" class="sal-content hidden"><div class="flex gap-2 mb-6 p-4 glass-card"><input type="text" id="desc-sal-${id}" placeholder="Fonte" class="flex-1 p-3 glass-input text-sm"><input type="number" id="valor-sal-${id}" placeholder="R$" class="w-32 p-3 glass-input text-sm font-bold"><button onclick="addItem('${id}', 'sal')" class="bg-green-600 px-6 rounded-xl font-bold">OK</button></div><table class="w-full text-xs"><tbody id="tabela-sal-${id}"></tbody></table></div>`;
                contDev.innerHTML += `<div id="dev-mes-${id}" class="dev-content hidden"><div class="flex gap-2 mb-6 p-4 glass-card"><input type="text" id="desc-dev-${id}" placeholder="Nome" class="flex-1 p-3 glass-input text-sm"><input type="number" id="valor-dev-${id}" placeholder="R$" class="w-32 p-3 glass-input text-sm font-bold"><button onclick="addItem('${id}', 'dev')" class="bg-orange-600 px-6 rounded-xl font-bold">OK</button></div><table class="w-full text-xs"><tbody id="tabela-dev-${id}"></tbody></table></div>`;

                let chips = despesasFixas.map(f => `<span class="bg-slate-800 px-3 py-1 rounded-lg text-[9px] font-bold cursor-pointer hover:bg-blue-600 mr-2 border border-slate-700" onclick="window.preencherFixa('${id}', '${f}')">${f}</span>`).join('');
                let diasOptions = `<option value="">Dia</option>`;
                for(let d=1; d<=31; d++) diasOptions += `<option value="${d}">${d}</option>`;

                contGas.innerHTML += `
                    <div id="aba-${id}" class="content-tab hidden">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-3xl font-black uppercase">${mesesNomes[i]}</h3>
                            <div class="flex">${chips}</div>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-8 p-4 glass-card">
                            <input type="text" id="desc-${id}" placeholder="Descrição" class="flex-1 p-4 glass-input text-sm outline-none">
                            <select id="dia-${id}" class="w-24 p-4 glass-input text-sm font-bold text-blue-400 outline-none">${diasOptions}</select>
                            <input type="number" id="valor-${id}" placeholder="R$" class="w-32 p-4 glass-input text-sm font-bold">
                            <button onclick="addItem('${id}', 'gas')" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-xl font-bold">ADICIONAR</button>
                        </div>
                        <table class="w-full text-xs"><tbody id="tabela-gas-${id}"></tbody></table>
                    </div>`;
            });
        };

        montarEstrutura();

        const carregarDadosDoAno = (ano) => {
            document.getElementById('label-ano-resumo').innerText = ano;
            const dbPath = ref(dbFirebase, `pegas_v1/transacoes/${ano}`);
            off(dbPath);
            onValue(dbPath, (snap) => {
                localDB = snap.val() || {};
                renderTudo();
            });
        };

        window.addItem = (mes, tipo) => {
            const p = tipo === 'sal' ? '-sal-' : (tipo === 'dev' ? '-dev-' : '-');
            const d = document.getElementById(`desc${p}${mes}`);
            const v = document.getElementById(`valor${p}${mes}`);
            const diaSel = document.getElementById(`dia-${mes}`);
            if(!d.value || !v.value) return;
            const refItem = push(ref(dbFirebase, `pegas_v1/transacoes/${anoAtual}/${mes}/${tipo}`));
            set(refItem, { id: refItem.key, desc: d.value, valor: parseFloat(v.value), dia: diaSel ? diaSel.value : "", ts: Date.now() });
            d.value = ""; v.value = ""; if(diaSel) diaSel.value = "";
        };

        window.excluirItem = (mes, tipo, id) => {
            if(confirm("Remover?")) remove(ref(dbFirebase, `pegas_v1/transacoes/${anoAtual}/${mes}/${tipo}/${id}`));
        };

        const renderTudo = () => {
            mesesIds.forEach(id => {
                ['sal', 'dev', 'gas'].forEach(tipo => {
                    const cont = document.getElementById(`tabela-${tipo === 'gas' ? 'gas' : tipo}-${id}`);
                    if(!cont) return;
                    const lista = Object.values(localDB[id]?.[tipo] || {}).sort((a,b) => (b.ts || 0) - (a.ts || 0));
                    cont.innerHTML = lista.map(i => `
                        <tr class="row-bg">
                            <td class="p-4"><div class="flex items-center gap-3">${i.dia ? `<span class="chip-dia">D${i.dia}</span>` : ''}<span class="font-bold uppercase text-slate-200">${i.desc}</span></div></td>
                            <td class="p-4 text-right font-mono text-slate-400">${formatar(i.valor)}</td>
                            <td class="p-4 text-right"><button onclick="excluirItem('${id}','${tipo}','${i.id}')" class="text-slate-600 hover:text-red-500">✕</button></td>
                        </tr>`).join('');
                });
                const rSal = Object.values(localDB[id]?.sal || {}).reduce((s,i) => s+i.valor, 0);
                const rGas = Object.values(localDB[id]?.gas || {}).reduce((s,i) => s+i.valor, 0);
                document.getElementById(`res-sal-${id}`).innerText = formatar(rSal);
                document.getElementById(`res-gas-${id}`).innerText = formatar(rGas);
                const total = rSal - rGas;
                const elTot = document.getElementById(`res-tot-${id}`);
                elTot.innerText = formatar(total);
                elTot.className = `p-4 text-right font-mono font-bold ${total >= 0 ? 'text-blue-400' : 'text-red-500'}`;
            });
        };

        function formatar(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        window.mudarAba = (id) => {
            document.querySelectorAll('.content-tab').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('aba-' + id)?.classList.remove('hidden');
            document.getElementById('btn-' + id)?.classList.add('tab-active');
            if(id === 'salario') mudarMesSubAba('jan', 'sal');
            if(id === 'devedores') mudarMesSubAba('jan', 'dev');
        };

        window.mudarMesSubAba = (id, tipo) => {
            document.querySelectorAll(`.${tipo}-content`).forEach(e => e.classList.add('hidden'));
            document.querySelectorAll(`[id^="btn-${tipo}-"]`).forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`${tipo}-mes-${id}`)?.classList.remove('hidden');
            document.getElementById(`btn-${tipo}-${id}`).classList.add('tab-active');
        };

        window.preencherFixa = (mes, nome) => { document.getElementById('desc-'+mes).value = nome; };

        document.getElementById('select-ano').addEventListener('change', (e) => {
            anoAtual = e.target.value;
            carregarDadosDoAno(anoAtual);
        });

        carregarDadosDoAno(anoAtual);
    </script>
</body>
</html>
